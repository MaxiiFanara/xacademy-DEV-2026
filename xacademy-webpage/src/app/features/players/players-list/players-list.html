<div class="page-wrapper">

  <app-navbar />

  <main class="main-content">
    <div class="container">

      <h1 class="page-title">Listado de jugadores</h1>

      <app-player-filters (filterChange)="onFilterChange($event)" />

      @defer (on idle) {
        <app-player-table
  [players]="players()"
  [loading]="loading()"
  [totalRecords]="totalRecords()"
  [totalPages]="totalPages()"
  [currentPage]="currentPage()"
  (viewDetail)="onViewDetail($event)"
  (edit)="onEdit($event)"
  (pageChange)="onPageChange($event)"
/>
      } @placeholder {
        <app-loading-spinner />
      }
<div class="create-action">
  <p-button
    label="Importar CSV"
    icon="pi pi-upload"
    severity="secondary"
    (onClick)="openImportDialog()"
  />
  <p-button
    label="Descargar CSV"
    icon="pi pi-download"
    severity="secondary"
    [loading]="exporting()"
    (onClick)="downloadCSV()"
  />
  <p-button
    label="Crear jugador"
    icon="pi pi-plus"
    (onClick)="openCreateDialog()"
  />
</div>

<p-dialog
  [visible]="showImportDialog()"
  (visibleChange)="showImportDialog.set($event)"
  [modal]="true"
  [style]="{ width: '600px' }"
  [draggable]="false"
>
  <app-import-csv (imported)="onImported()" />
</p-dialog>

      <p-dialog
        [visible]="showCreateDialog()"
        (visibleChange)="showCreateDialog.set($event)"
        [modal]="true"
        [style]="{ width: '80vw', maxWidth: '900px' }"
        [draggable]="false"
      >
        @if (showCreateDialog()) {
          <app-player-form [standalone]="true" (saved)="closeCreateDialog()" />
        }
      </p-dialog>

    </div>
  </main>

  <app-footer />

</div>
