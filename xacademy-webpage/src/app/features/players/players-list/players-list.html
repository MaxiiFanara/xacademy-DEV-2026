<div class="page-wrapper">

  <app-navbar />

  <main class="main-content">
    <div class="container">

      <h1 class="page-title">Listado de jugadores</h1>

      <!-- FILTROS -->
      <app-player-filters (filterChange)="onFilterChange($event)" />

      <!-- TABLA -->
      @defer (on idle) {
        <app-player-table
  [players]="players()"
  [loading]="loading()"
  [totalRecords]="totalRecords()"
  [totalPages]="totalPages()"
  [currentPage]="currentPage()"
  (viewDetail)="onViewDetail($event)"
  (edit)="onEdit($event)"
  (pageChange)="onPageChange($event)"
/>
      } @placeholder {
        <app-loading-spinner />
      }
      <div class="create-action">
  <p-button
    label="Descargar CSV"
    icon="pi pi-download"
    severity="secondary"
    [loading]="exporting()"
    (onClick)="downloadCSV()"
  />
  <div>
  <p-button
          label="Crear jugador"
          icon="pi pi-plus"
          (onClick)="openCreateDialog()"
        /></div>
  
</div>

      <!-- DIALOG CREAR JUGADOR -->
      <p-dialog
        [visible]="showCreateDialog()"
        (visibleChange)="showCreateDialog.set($event)"
        [modal]="true"
        [style]="{ width: '80vw', maxWidth: '900px' }"
        [draggable]="false"
      >
        <app-player-form [standalone]="true" (saved)="closeCreateDialog()" />
      </p-dialog>

    </div>
  </main>

  <app-footer />

</div>
