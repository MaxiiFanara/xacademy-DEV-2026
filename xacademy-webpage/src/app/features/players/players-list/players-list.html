<div class="page-wrapper">

  <app-navbar />

  <main class="main-content">
    <div class="container">

      <h1 class="page-title">Listado de jugadores</h1>

      <!-- FILTROS -->
      <app-player-filters (filterChange)="onFilterChange($event)" />

      <!-- TABLA -->
      @defer (on idle) {
        <app-player-table
          [players]="players()"
          [loading]="loading()"
          (viewDetail)="onViewDetail($event)"
          (edit)="onEdit($event)"
        />
      } @placeholder {
        <app-loading-spinner />
      }

      <!-- BOTON CREAR -->
      <div class="create-action">
        <p-button
          label="Crear jugador"
          icon="pi pi-plus"
          (onClick)="openCreateDialog()"
        />
      </div>

      <!-- DIALOG CREAR JUGADOR -->
      <p-dialog
        header="Crear jugador"
        [visible]="showCreateDialog()"
        (visibleChange)="showCreateDialog.set($event)"
        [modal]="true"
        [style]="{ width: '80vw', maxWidth: '900px' }"
        [draggable]="false"
      >
        <app-player-form [standalone]="true" />
      </p-dialog>

    </div>
  </main>

  <app-footer />

</div>
