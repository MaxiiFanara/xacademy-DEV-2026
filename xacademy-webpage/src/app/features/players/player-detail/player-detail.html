<div class="page-wrapper">
  <app-navbar />

  <main class="main-content">
    <div class="container">

      <p-button
        label="Volver al listado"
        icon="pi pi-arrow-left"
        severity="secondary"
        (onClick)="goBack()"
        class="back-btn"
      />

      @if (loading()) {
        <app-loading-spinner />
      }

      @if (!loading() && player()) {
        @let p = player()!;

        <!-- CARD HEADER -->
        <app-player-card-header [player]="p" />

        <!-- RADAR CHART -->
        <div class="section">
          <h3 class="section-title">Habilidades</h3>
          @defer (on idle) {
            <app-radar-chart [labels]="p.labels" [data]="p.skillsData" />
          } @placeholder {
            <app-loading-spinner />
          }
        </div>

        <!-- BOTON VER EVOLUCION -->
        <div class="timeline-action">
          <p-button
            [label]="showTimeline() ? 'Ocultar evolución' : 'Ver evolución de habilidades'"
            icon="pi pi-chart-line"
            severity="info"
            (onClick)="toggleTimeline()"
          />
        </div>

        <!-- TIMELINE -->
        @if (showTimeline()) {
          @defer (on immediate) {
            <div class="section">
              <app-skill-timeline
                [idJugador]="playerId()"
                [skills]="availableSkills()"
              />
            </div>
          } @placeholder {
            <app-loading-spinner />
          }
        }
      }

      @if (!loading() && !player()) {
        <p class="not-found">No se encontró el jugador</p>
      }

    </div>
  </main>

  <app-footer />
</div>
