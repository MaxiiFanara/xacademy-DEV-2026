paths:
  /api/jugador:
    get:
      summary: Obtiene el listado paginado de jugadores
      description: >
        Retorna un listado paginado de jugadores con sus datos de version actual.
        Requiere autenticacion. Acepta parametros de paginacion y filtros opcionales.
      tags:
        - Jugador
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Numero de pagina (por defecto 1)
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          required: false
          description: Cantidad de resultados por pagina (por defecto 10)
          schema:
            type: integer
            example: 10
        - name: nombre
          in: query
          required: false
          description: Filtra por nombre del jugador
          schema:
            type: string
            example: Messi
      responses:
        '200':
          description: Listado de jugadores obtenido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: array
                    items:
                      $ref: '#/components/schemas/JugadorListado'
                  total:
                    type: integer
                    example: 100
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
